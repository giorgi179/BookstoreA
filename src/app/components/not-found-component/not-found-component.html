<section class="not-found" #hero>
  <div class="not-found__noise" aria-hidden="true"></div>

  <div class="not-found__inner">

    <!-- Arch -->
    <div class="not-found__arch" aria-hidden="true">
      <div class="not-found__arch-mask">
        <div class="not-found__arch-body">
          <span class="not-found__arch-number">404</span>
          <span class="not-found__arch-divider"></span>
          <span class="not-found__arch-icon">&#128218;</span>
        </div>
      </div>
      <div class="not-found__arch-vignette"></div>
    </div>

    <!-- Text -->
    <div class="not-found__content">
      <h1 class="not-found__title">გვერდი ვერ მოიძებნა</h1>

      <p class="not-found__desc">
        ეს წიგნი, სამწუხაროდ, ჩვენს თაროებზე არ გვხვდება.
        შეიძლება გადავიდა სხვაგან, ან ბმული არასწორია.
      </p>

      <div class="not-found__actions">
        <a class="not-found__btn not-found__btn--primary" routerLink="/">
          მთავარ გვერდზე დაბრუნება
        </a>
        <a class="not-found__btn not-found__btn--ghost" routerLink="/books">
          კატალოგის ნახვა
        </a>
      </div>

      <p class="not-found__breadcrumb">საწყისი &nbsp;·&nbsp; 404</p>
    </div>

  </div>
</section>
